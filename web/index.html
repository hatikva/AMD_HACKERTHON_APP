<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Version 6 Analytics</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Version 6 Analytics</h1>
        <p>Track 1 submission readiness evidence</p>
      </div>
      <div class="status-strip" id="statusStrip">
        <span>Loading</span>
      </div>
    </header>

    <main class="layout">
      <nav class="tabbar" aria-label="Analytics pages">
        <button class="tab-button active" type="button" data-view="overviewView">Overview</button>
        <button class="tab-button" type="button" data-view="resultsView">Results</button>
        <button class="tab-button" type="button" data-view="categoryView">Categories</button>
        <button class="tab-button" type="button" data-view="routeView">Route Flow</button>
        <button class="tab-button" type="button" data-view="localView">Local Nemotron</button>
        <button class="tab-button" type="button" data-view="readinessView">Readiness</button>
        <button class="tab-button" type="button" data-view="failuresView">Failures</button>
        <button class="tab-button" type="button" data-view="complianceView">Compliance</button>
        <button class="tab-button" type="button" data-view="deducedView">Deduced Analytics</button>
      </nav>

      <section class="view review-view active" id="overviewView"><div class="review-content" id="overview"></div></section>
      <section class="view review-view" id="resultsView"><div class="review-content" id="results"></div></section>
      <section class="view review-view" id="categoryView"><div class="review-content" id="categories"></div></section>
      <section class="view review-view" id="routeView"><div class="review-content" id="routeFlow"></div></section>
      <section class="view review-view" id="localView"><div class="review-content" id="localEvidence"></div></section>
      <section class="view review-view" id="readinessView"><div class="review-content" id="readiness"></div></section>
      <section class="view review-view" id="failuresView"><div class="review-content" id="failures"></div></section>
      <section class="view review-view" id="complianceView"><div class="review-content" id="compliance"></div></section>
      <section class="view review-view" id="deducedView"><div class="review-content" id="deduced"></div></section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
