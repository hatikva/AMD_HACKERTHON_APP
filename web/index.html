<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Version 6 Analytics</title>
    <link rel="stylesheet" href="/styles.css?v=20260711-tabs">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Version 6 Analytics</h1>
        <p>Track 1 submission readiness evidence</p>
      </div>
      <div class="status-strip" id="statusStrip">
        <span>Loading</span>
      </div>
    </header>

    <main class="layout">
      <nav class="tabbar" id="tabbar" aria-label="Analytics pages" role="tablist">
        <button class="tab-button active" type="button" data-view="overviewView" aria-controls="overviewView" aria-selected="true" role="tab">Overview</button>
        <button class="tab-button" type="button" data-view="resultsView" aria-controls="resultsView" aria-selected="false" role="tab">Results</button>
        <button class="tab-button" type="button" data-view="categoryView" aria-controls="categoryView" aria-selected="false" role="tab">Categories</button>
        <button class="tab-button" type="button" data-view="routeView" aria-controls="routeView" aria-selected="false" role="tab">Route Flow</button>
        <button class="tab-button" type="button" data-view="localView" aria-controls="localView" aria-selected="false" role="tab">Local Nemotron</button>
        <button class="tab-button" type="button" data-view="readinessView" aria-controls="readinessView" aria-selected="false" role="tab">Readiness</button>
        <button class="tab-button" type="button" data-view="failuresView" aria-controls="failuresView" aria-selected="false" role="tab">Failures</button>
        <button class="tab-button" type="button" data-view="complianceView" aria-controls="complianceView" aria-selected="false" role="tab">Compliance</button>
        <button class="tab-button" type="button" data-view="calibrationView" aria-controls="calibrationView" aria-selected="false" role="tab">Calibration</button>
        <button class="tab-button" type="button" data-view="deducedView" aria-controls="deducedView" aria-selected="false" role="tab">Deduced Analytics</button>
      </nav>

      <section class="view review-view active" id="overviewView" role="tabpanel"><div class="review-content" id="overview"></div></section>
      <section class="view review-view" id="resultsView" role="tabpanel" hidden><div class="review-content" id="results"></div></section>
      <section class="view review-view" id="categoryView" role="tabpanel" hidden><div class="review-content" id="categories"></div></section>
      <section class="view review-view" id="routeView" role="tabpanel" hidden><div class="review-content" id="routeFlow"></div></section>
      <section class="view review-view" id="localView" role="tabpanel" hidden><div class="review-content" id="localEvidence"></div></section>
      <section class="view review-view" id="readinessView" role="tabpanel" hidden><div class="review-content" id="readiness"></div></section>
      <section class="view review-view" id="failuresView" role="tabpanel" hidden><div class="review-content" id="failures"></div></section>
      <section class="view review-view" id="complianceView" role="tabpanel" hidden><div class="review-content" id="compliance"></div></section>
      <section class="view review-view" id="calibrationView" role="tabpanel" hidden><div class="review-content" id="calibration"></div></section>
      <section class="view review-view" id="deducedView" role="tabpanel" hidden><div class="review-content" id="deduced"></div></section>
    </main>

    <script src="/app.js?v=20260711-tabs"></script>
  </body>
</html>
